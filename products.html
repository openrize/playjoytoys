<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Products | Kids Toys Online – PlayJoy Toys</title>
    <meta name="description"
        content="Shop all PlayJoy Toys products. Safe, fun, and educational toys for kids of all ages with fast shipping." />
    <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🧸</div>Play<span>Joy</span> Toys
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="categories.html">Categories</a></li>
                <li><a href="products.html" class="active">Products</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <div class="nav-cart" title="Contact us">🛒<div class="cart-count">0</div>
                </div>
                <a href="products.html" class="btn btn-primary" style="padding:10px 22px;font-size:0.9rem;">View Portfolio</a>
                <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
            </div>
        </div>
    </nav>
    <div class="mobile-menu" id="mobileMenu">
        <button class="mobile-close" id="mobileClose">✕</button>
        <a href="index.html">Home</a><a href="categories.html">Categories</a><a href="products.html">Products</a><a
            href="blog.html">Blog</a><a href="about.html">About</a><a href="contact.html">Contact</a>
    </div>

    <div class="page-header">
        <div class="container">
            <div class="breadcrumb"><a href="index.html">Home</a> › <span>All Products</span></div>
            <div class="badge">🛍️ Browse Everything</div>
            <h1>All <span class="gradient-text">Products</span></h1>
            <p>500+ hand-picked toys for every age, interest, and budget.</p>
        </div>
    </div>

    <section class="section" style="padding-top:40px">
        <div class="container">
            <!-- Search + Filter Bar -->
            <div style="display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap;align-items:center">
                <div style="flex:1;min-width:260px;position:relative">
                    <input type="text" class="form-input" placeholder="🔍 Search toys..." style="padding-left:20px"
                        id="searchInput" oninput="filterProducts()" />
                </div>
                <select class="form-select" style="width:180px" id="sortSelect" onchange="filterProducts()">
                    <option value="Best Selling">Sort: Best Selling</option>
                    <option value="Name: A-Z">Name: A-Z</option>
                    <option value="Name: Z-A">Name: Z-A</option>
                    <option value="Best Rated">Best Rated</option>
                    <option value="Newest First">Newest First</option>
                </select>
            </div>

            <div class="filter-bar" style="margin-bottom:12px">
                <button class="filter-btn active" onclick="filterAge(this,'all')">All Ages</button>
                <button class="filter-btn" onclick="filterAge(this,'0-2')">👶 0-2 Years</button>
                <button class="filter-btn" onclick="filterAge(this,'3-5')">🧒 3-5 Years</button>
                <button class="filter-btn" onclick="filterAge(this,'6-8')">🧑 6-8 Years</button>
                <button class="filter-btn" onclick="filterAge(this,'9-12')">👦 9-12 Years</button>
            </div>

            <div class="filter-bar" style="margin-bottom:20px">
                <button class="filter-btn active" onclick="filterCat(this,'all')">All Types</button>
                <button class="filter-btn" onclick="filterCat(this,'educational')">🔬 Educational</button>
                <button class="filter-btn" onclick="filterCat(this,'outdoor')">âš½ Outdoor</button>
                <button class="filter-btn" onclick="filterCat(this,'plush')">🧸 Plush</button>
                <button class="filter-btn" onclick="filterCat(this,'creative')">🎨 Creative</button>
                <button class="filter-btn" onclick="filterCat(this,'board')">🎲 Board Games</button>
            </div>

            <div style="margin-bottom:20px;font-size:0.95rem;color:var(--text-secondary)">
                Showing <strong id="productCount" style="color:white">0</strong> products
            </div>

            <div id="productsGrid" class="products-grid">
                <!-- Dynamic items injected here -->
            </div>

            <div id="pagination" class="pagination" style="display:flex;justify-content:center;gap:10px;margin-top:40px;flex-wrap:wrap">
                <!-- Pagination buttons injected here -->
            </div>
        </div>
    </section>

    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script>
        const grid = document.getElementById('productsGrid');
        const paginationContainer = document.getElementById('pagination');
        const searchInput = document.getElementById('searchInput');
        
        let currentAge = 'all';
        let currentCat = 'all';
        let currentPage = 1;
        const itemsPerPage = 12;
        let filteredProducts = [];

        // Check URL for category filter (e.g. from homepage)
        const urlParams = new URLSearchParams(window.location.search);
        const urlCat = urlParams.get('category');
        if (urlCat) {
            currentCat = urlCat;
            document.querySelectorAll('.filter-btn').forEach(b => {
                if(b.textContent.toLowerCase().includes(urlCat) || (urlCat === 'board' && b.textContent.includes('Board'))) {
                    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                    b.classList.add('active');
                }
            });
        }

        function renderProducts() {
            try {
                const start = (currentPage - 1) * itemsPerPage;
                const end = start + itemsPerPage;
                const pageItems = filteredProducts.slice(start, end);

                document.getElementById('productCount').textContent = filteredProducts.length;

                grid.innerHTML = pageItems.map(p => {
                    let badgeHtml = '';
                    if (p.badge) {
                        let badgeClass = 'hot';
                        if (p.badge === 'Best Seller') badgeClass = 'hot';
                        else if (p.badge === 'STEM') badgeClass = 'sale';
                        else badgeClass = 'sale'; // fallback color
                        badgeHtml = `<span class="product-badge ${badgeClass}" style="top:10px;right:10px;left:auto;background:var(--primary)">⭐ ${p.badge}</span>`;
                    }
                    
                    let saleBadge = '';
                    let safeCategory = p.category || 'toy';
                    let safeName = p.name || 'Toy';
                    let safeDesc = p.fullName ? p.fullName.substring(0, 60) : safeName;

                    return `
                    <div class="product-card" data-cat="${safeCategory}">
                        ${saleBadge}
                        ${badgeHtml}
                        <div class="product-img">
                            ${p.image ? `<img src="${p.image}" alt="${safeName}" style="width:100%;height:100%;object-fit:cover;border-radius:15px;" onerror="this.onerror=null; this.src=''; this.alt='🧸';">` : p.emoji || '🧸'}
                            <button class="product-wishlist">♡</button>
                        </div>
                        <div class="product-info">
                            <div class="product-category">${safeCategory.charAt(0).toUpperCase() + safeCategory.slice(1)} • Age: ${p.ageRange || 'All'}</div>
                            <div class="product-name">${safeName}</div>
                            <div class="product-desc">${safeDesc}...</div>
                            <div class="product-rating">
                                <span class="stars">★★★★★</span>
                                <span class="rating-count">(${p.reviews || 0})</span>
                            </div>
                            <div class="product-footer">
                                <div class="product-price" style="display:flex;flex-direction:column;gap:4px;align-items:flex-start;">
                                    <span class="price-current">Contact</span>
                                    <span class="price-original" style="font-size:0.78rem;">Email: openrize@gmail.com</span>
                                    <span class="price-original" style="font-size:0.78rem;">Phone: +1 (224) 377 9043</span>
                                </div>
                                <button class="btn-add-cart" title="Contact us" onclick='addToCart(this, ${JSON.stringify(p).replace(/'/g, "&#39;").replace(/"/g, "&quot;")})'>🛒</button>
                            </div>
                        </div>
                    </div>
                `}).join('');

                renderPagination();

                // Re-bind wishlist events
                document.querySelectorAll('.product-wishlist').forEach(btn => { 
                    btn.addEventListener('click', function (e) { 
                        e.stopPropagation(); 
                        this.textContent = this.textContent === '♡' ? '❤️' : '♡'; 
                    }); 
                });
                
                // Scroll to top of grid on page change
                if (currentPage > 1 && grid) {
                    grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            } catch (err) {
                console.error("Render Error: ", err);
                grid.innerHTML = `<div style="color:red;padding:20px;">Error rendering products: ${err.message}. Please check the console.</div>`;
            }
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
            if (totalPages <= 1) {
                paginationContainer.innerHTML = '';
                return;
            }

            let html = '';
            // Previous button
            html += `<button class="btn ${currentPage === 1 ? 'btn-disabled' : 'btn-outline'}" 
                     ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">Prev</button>`;

            // Page numbers
            const maxVisible = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            
            if (endPage - startPage + 1 < maxVisible) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="btn ${i === currentPage ? 'btn-primary' : 'btn-outline'}" 
                         style="min-width:45px" onclick="changePage(${i})">${i}</button>`;
            }

            // Next button
            html += `<button class="btn ${currentPage === totalPages ? 'btn-disabled' : 'btn-outline'}" 
                     ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">Next</button>`;

            paginationContainer.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            renderProducts();
        }

        function filterCat(btn, cat) {
            currentCat = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentPage = 1;
            filterProducts();
        }

        function filterAge(btn, age) {
            currentAge = age;
            const siblings = btn.parentElement.querySelectorAll('.filter-btn');
            siblings.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentPage = 1;
            filterProducts();
        }

        function filterProducts() {
            try {
                const q = searchInput ? searchInput.value.toLowerCase() : '';
                const sortSelect = document.getElementById('sortSelect');
                const sort = sortSelect ? sortSelect.value : 'Best Selling';
                
                filteredProducts = PRODUCTS_DATA.filter(p => {
                    const matchCat = currentCat === 'all' || p.category === currentCat;
                    const matchAge = currentAge === 'all' || p.ageRange === currentAge;
                    const safeName = p.name ? p.name.toLowerCase() : '';
                    const safeFullName = p.fullName ? p.fullName.toLowerCase() : '';
                    const matchSearch = safeName.includes(q) || safeFullName.includes(q);
                    return matchCat && matchAge && matchSearch;
                });

                if (sort === 'Name: A-Z') filteredProducts.sort((a,b) => (a.name||'').localeCompare(b.name||''));
                else if (sort === 'Name: Z-A') filteredProducts.sort((a,b) => (b.name||'').localeCompare(a.name||''));
                else if (sort === 'Best Rated') filteredProducts.sort((a,b) => (b.rating||0) - (a.rating||0));
                else if (sort === 'Best Selling') filteredProducts.sort((a,b) => (b.reviews||0) - (a.reviews||0));
                
                if (q) currentPage = 1; // Reset to page 1 on search
                renderProducts();
            } catch (err) {
                console.error("Filter Error: ", err);
                if (grid) grid.innerHTML = `<div style="color:red;padding:20px;">Error filtering products: ${err.message}. Please check the console.</div>`;
            }
        }

        // Initial render
        filterProducts();

        // UI Helpers
        function addToCart(btn, product) {
            Cart.add(product);
            const originalText = btn.textContent;
            btn.textContent = '✓';
            btn.style.background = 'var(--accent-green)';
            btn.style.color = 'white';
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '';
                btn.style.color = '';
            }, 1500);
        }
        document.getElementById('hamburger').addEventListener('click', () => document.getElementById('mobileMenu').classList.add('open'));
        document.getElementById('mobileClose').addEventListener('click', () => document.getElementById('mobileMenu').classList.remove('open'));
    </script>
</body>

</html>
