<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Products | Kids Toys Online – PlayJoy Toys</title>
    <meta name="description"
        content="Shop all PlayJoy Toys products. Safe, fun, and educational toys for kids of all ages with fast shipping." />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🧸</div>Play<span>Joy</span> Toys
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="categories.html">Categories</a></li>
                <li><a href="products.html" class="active">Products</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <div class="nav-cart">🛒<div class="cart-count">0</div>
                </div>
                <a href="products.html" class="btn btn-primary" style="padding:10px 22px;font-size:0.9rem;">Shop Now</a>
                <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
            </div>
        </div>
    </nav>
    <div class="mobile-menu" id="mobileMenu">
        <button class="mobile-close" id="mobileClose">✕</button>
        <a href="index.html">Home</a><a href="categories.html">Categories</a><a href="products.html">Products</a><a
            href="blog.html">Blog</a><a href="about.html">About</a><a href="contact.html">Contact</a>
    </div>

    <div class="page-header">
        <div class="container">
            <div class="breadcrumb"><a href="index.html">Home</a> › <span>All Products</span></div>
            <div class="badge">🛍️ Browse Everything</div>
            <h1>All <span class="gradient-text">Products</span></h1>
            <p>500+ hand-picked toys for every age, interest, and budget.</p>
        </div>
    </div>

    <section class="section" style="padding-top:40px">
        <div class="container">
            <!-- Search + Filter Bar -->
            <div style="display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap;align-items:center">
                <div style="flex:1;min-width:260px;position:relative">
                    <input type="text" class="form-input" placeholder="🔍 Search toys..." style="padding-left:20px"
                        id="searchInput" oninput="filterProducts()" />
                </div>
                <select class="form-select" style="width:180px" id="sortSelect" onchange="filterProducts()">
                    <option>Sort: Featured</option>
                    <option>Price: Low to High</option>
                    <option>Price: High to Low</option>
                    <option>Best Rated</option>
                    <option>Newest First</option>
                </select>
            </div>

            <div class="filter-bar" style="margin-bottom:36px">
                <button class="filter-btn active" onclick="filterCat(this,'all')">All</button>
                <button class="filter-btn" onclick="filterCat(this,'educational')">🔬 Educational</button>
                <button class="filter-btn" onclick="filterCat(this,'outdoor')">⚽ Outdoor</button>
                <button class="filter-btn" onclick="filterCat(this,'plush')">🧸 Plush</button>
                <button class="filter-btn" onclick="filterCat(this,'creative')">🎨 Creative</button>
                <button class="filter-btn" onclick="filterCat(this,'board')">🎲 Board Games</button>
            </div>

            <div id="productsGrid" class="products-grid">
                <!-- Dynamic items injected here -->
            </div>

            <div id="pagination" class="pagination" style="display:flex;justify-content:center;gap:10px;margin-top:40px;flex-wrap:wrap">
                <!-- Pagination buttons injected here -->
            </div>
        </div>
    </section>

    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script>
        const grid = document.getElementById('productsGrid');
        const paginationContainer = document.getElementById('pagination');
        const searchInput = document.getElementById('searchInput');
        
        let currentCat = 'all';
        let currentPage = 1;
        const itemsPerPage = 21; // 3 items per row, 7 rows
        let filteredProducts = [...PRODUCTS_DATA];

        function renderProducts() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = filteredProducts.slice(start, end);

            grid.innerHTML = pageItems.map(p => `
                <div class="product-card" data-cat="${p.category}">
                    ${p.price < p.originalPrice * 0.7 ? '<span class="product-badge sale">💰 Sale</span>' : ''}
                    <div class="product-img">
                        ${p.image ? `<img src="${p.image}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;border-radius:15px;">` : p.emoji}
                        <button class="product-wishlist">♡</button>
                    </div>
                    <div class="product-info">
                        <div class="product-category">${p.category.charAt(0).toUpperCase() + p.category.slice(1)}</div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-desc">${p.fullName.substring(0, 60)}...</div>
                        <div class="product-rating">
                            <span class="stars">★★★★★</span>
                            <span class="rating-count">(${p.reviews})</span>
                        </div>
                        <div class="product-footer">
                            <div class="product-price">
                                <span class="price-current">$${p.price}</span>
                                <span class="price-original">$${p.originalPrice}</span>
                            </div>
                            <button class="btn-add-cart" onclick="addToCart(this, ${JSON.stringify(p).replace(/"/g, '&quot;')})">🛒</button>
                        </div>
                    </div>
                </div>
            `).join('');

            renderPagination();

            // Re-bind wishlist events
            document.querySelectorAll('.product-wishlist').forEach(btn => { 
                btn.addEventListener('click', function (e) { 
                    e.stopPropagation(); 
                    this.textContent = this.textContent === '♡' ? '❤️' : '♡'; 
                }); 
            });
            
            // Scroll to top of grid on page change
            if (currentPage > 1) {
                grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredProducts.length / itemsPerPage);
            if (totalPages <= 1) {
                paginationContainer.innerHTML = '';
                return;
            }

            let html = '';
            // Previous button
            html += `<button class="btn ${currentPage === 1 ? 'btn-disabled' : 'btn-outline'}" 
                     ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">Prev</button>`;

            // Page numbers
            const maxVisible = 5;
            let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let endPage = Math.min(totalPages, startPage + maxVisible - 1);
            
            if (endPage - startPage + 1 < maxVisible) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="btn ${i === currentPage ? 'btn-primary' : 'btn-outline'}" 
                         style="min-width:45px" onclick="changePage(${i})">${i}</button>`;
            }

            // Next button
            html += `<button class="btn ${currentPage === totalPages ? 'btn-disabled' : 'btn-outline'}" 
                     ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">Next</button>`;

            paginationContainer.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            renderProducts();
        }

        function filterCat(btn, cat) {
            currentCat = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentPage = 1;
            filterProducts();
        }

        function filterProducts() {
            const q = searchInput.value.toLowerCase();
            const sort = document.getElementById('sortSelect').value;
            
            filteredProducts = PRODUCTS_DATA.filter(p => {
                const matchCat = currentCat === 'all' || p.category === currentCat;
                const matchSearch = p.name.toLowerCase().includes(q) || p.fullName.toLowerCase().includes(q);
                return matchCat && matchSearch;
            });

            if (sort === 'Price: Low to High') filteredProducts.sort((a,b) => a.price - b.price);
            else if (sort === 'Price: High to Low') filteredProducts.sort((a,b) => b.price - a.price);
            else if (sort === 'Best Rated') filteredProducts.sort((a,b) => b.rating - a.rating);
            
            if (q) currentPage = 1; // Reset to page 1 on search
            renderProducts();
        }

        // Initial render
        filterProducts();

        // UI Helpers
        function addToCart(btn, product) {
            Cart.add(product);
            const originalText = btn.textContent;
            btn.textContent = '✓';
            btn.style.background = 'var(--accent-green)';
            btn.style.color = 'white';
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '';
                btn.style.color = '';
            }, 1500);
        }
        document.getElementById('hamburger').addEventListener('click', () => document.getElementById('mobileMenu').classList.add('open'));
        document.getElementById('mobileClose').addEventListener('click', () => document.getElementById('mobileMenu').classList.remove('open'));
    </script>
</body>

</html>
